# Google Ad Manager SOAP API credentials
# Copy this to googleads.yaml and fill in your values.
# Docs: https://developers.google.com/ad-manager/api/start

ad_manager:
  # Your GAM 360 network code (found in Admin → Network settings)
  network_code: INSERT_NETWORK_CODE_HERE

  # Name shown in API request logs — any string is fine
  application_name: GAM360-Revenue-Pipeline

  # Path to your service account JSON key file
  # Created in Google Cloud Console → IAM → Service Accounts → Keys
  path_to_private_key_file: config/service_account.json

  # API version — keep this at the latest supported
  # Current latest: v202602
  # Check: https://developers.google.com/ad-manager/api/rel_notes
  # (no need to set this here; it's set per-call in the extractor)
